<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Display</title>
<link rel="stylesheet" href="styles.css">
<style>
  .board { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; padding: 16px; }
  .kcard { border-top: 4px solid var(--blue); }
  .kcard.preparing { border-top-color: var(--amber); }
  .kcard h2 { margin: 0 0 8px; font-size: 22px; }
  .kcard li { font-size: 16px; margin-bottom: 4px; }
  .timer { font-size: 12px; color: var(--text-dim); }
  body { padding-bottom: 16px; }
</style>
</head>
<body>

<div id="loginScreen" class="container" style="padding-top:60px">
  <h1 style="text-align:center;color:var(--gold-soft)">👨‍🍳 Kitchen Login</h1>
  <div class="pin-dots"><span></span><span></span><span></span><span></span></div>
  <p id="loginError" style="text-align:center;color:var(--red);min-height:18px;font-size:13px"></p>
  <div class="pin-pad">
    <button onclick="pinPress('1')">1</button><button onclick="pinPress('2')">2</button><button onclick="pinPress('3')">3</button>
    <button onclick="pinPress('4')">4</button><button onclick="pinPress('5')">5</button><button onclick="pinPress('6')">6</button>
    <button onclick="pinPress('7')">7</button><button onclick="pinPress('8')">8</button><button onclick="pinPress('9')">9</button>
    <button></button><button onclick="pinPress('0')">0</button><button onclick="pinBackspace()">⌫</button>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div class="topbar">
    <h1>🔥 Kitchen Display</h1>
    <button class="secondary" style="width:auto" onclick="logout()">Logout</button>
  </div>
  <div class="board" id="board"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>const REQUIRED_ROLE = 'cook';</script>
<script src="auth.js"></script>
<script>
function onLoginSuccess() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  listenOrders();
  setInterval(refreshTimers, 30000);
}

function listenOrders() {
  db.collection('orders').where('status', 'in', ['new', 'preparing']).onSnapshot(snap => {
    const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
    const board = document.getElementById('board');
    if (orders.length === 0) {
      board.innerHTML = '<div class="empty-state" style="grid-column:1/-1">All caught up 🎉</div>';
      return;
    }
    board.innerHTML = orders.map(o => `
      <div class="card kcard ${o.status}" data-created="${o.createdAt?.seconds || ''}">
        <h2>Table ${o.table.replace(/^T0*/,'')}</h2>
        <span class="badge ${o.status}">${o.status === 'new' ? 'New' : 'Preparing'}</span>
        <ul>${o.items.map(i => `<li>✔ ${i.qty} × ${i.name}</li>`).join('')}</ul>
        ${o.notes ? `<p class="small">📝 ${o.notes}</p>` : ''}
        <p class="timer">${timeAgo(o.createdAt)}</p>
        ${o.status === 'new'
          ? `<button onclick="startPreparing('${o.id}')">Start Preparing</button>`
          : `<button onclick="markReady('${o.id}')">Ready to Serve</button>`}
      </div>`).join('');
  });
}

function timeAgo(ts) {
  if (!ts) return 'just now';
  const secs = Math.floor(Date.now() / 1000 - ts.seconds);
  if (secs < 60) return secs + 's ago';
  return Math.floor(secs / 60) + ' min ago';
}
function refreshTimers() {
  document.querySelectorAll('[data-created]').forEach(el => {
    const secs = el.dataset.created;
    if (secs) {
      const p = el.querySelector('.timer');
      if (p) p.textContent = timeAgo({ seconds: parseInt(secs) });
    }
  });
}

function startPreparing(id) {
  db.collection('orders').doc(id).update({ status: 'preparing' });
}
function markReady(id) {
  db.collection('orders').doc(id).update({ status: 'ready', readyAt: firebase.firestore.FieldValue.serverTimestamp() });
}

if (!tryRestoreSession()) {
  document.getElementById('loginScreen').style.display = 'block';
}
</script>
</body>
</html>
