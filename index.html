<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menu | Order Now</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1420">
<link rel="stylesheet" href="styles.css">
<style>
  .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 16px 12px; }
  .tabs button { width: auto; white-space: nowrap; background: var(--bg-card); color: var(--text-dim); border: 1px solid var(--border); }
  .tabs button.active { background: var(--gold); color: #1a1408; border: none; }
  .item-card { display: flex; gap: 12px; }
  .item-img { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; background: #0f1726; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; margin: 0 0 4px; }
  .item-price { color: var(--gold-soft); font-weight: 700; }
  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-ctrl button { width: 30px; height: 30px; border-radius: 8px; padding: 0; font-size: 16px; }
  .cart-bar {
    position: fixed; bottom: 76px; left: 0; right: 0;
    background: var(--gold); color: #1a1408; padding: 14px 16px;
    display: none; justify-content: space-between; align-items: center;
    font-weight: 700; z-index: 25; cursor: pointer;
  }
  .sheet {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: none;
  }
  .sheet-inner {
    position: absolute; bottom: 0; left: 0; right: 0; max-height: 85vh; overflow-y: auto;
    background: var(--bg-card); border-radius: 20px 20px 0 0; padding: 20px;
  }
  .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1 id="restaurantName">Restaurant</h1>
    <div class="sub" id="tableLabel">Table --</div>
  </div>
  <button class="ghost" style="width:auto" onclick="showOrderHistory()">📋 My Orders</button>
</div>

<div class="tabs" id="categoryTabs"></div>

<div class="container" id="menuList">
  <div class="spinner"></div>
</div>

<div class="cart-bar" id="cartBar" onclick="openCart()">
  <span id="cartSummary">0 items</span>
  <span>View Cart →</span>
</div>

<!-- Cart Sheet -->
<div class="sheet" id="cartSheet">
  <div class="sheet-inner">
    <h2 style="margin-top:0;color:var(--gold-soft)">Your Order</h2>
    <div id="cartItems"></div>
    <textarea id="specialInstructions" placeholder="Special instructions (e.g. less spicy, no onion)"></textarea>
    <div class="row" style="margin-bottom:14px">
      <strong>Total</strong>
      <strong id="cartTotal" style="color:var(--gold-soft)">₹0</strong>
    </div>
    <button onclick="placeOrder()">Place Order</button>
    <button class="secondary" style="margin-top:8px" onclick="closeCart()">Continue Browsing</button>
  </div>
</div>

<!-- Order History Sheet -->
<div class="sheet" id="historySheet">
  <div class="sheet-inner">
    <h2 style="margin-top:0;color:var(--gold-soft)">Order Status</h2>
    <div id="historyList"></div>
    <div class="grid-2" style="margin-top:10px">
      <button class="secondary" onclick="callWaiter()">🔔 Call Waiter</button>
      <button onclick="requestBill()">🧾 Request Bill</button>
    </div>
    <button class="secondary" style="margin-top:8px" onclick="closeHistory()">Close</button>
  </div>
</div>

<div id="toastHolder"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const tableId = params.get('table') || 'T01';
document.getElementById('tableLabel').textContent = 'Table ' + tableId.replace(/^T0*/,'');

let menuItems = [];
let categories = [];
let activeCategory = 'all';
let cart = JSON.parse(sessionStorage.getItem('cart_' + tableId) || '{}');

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toastHolder').appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function saveCart() {
  sessionStorage.setItem('cart_' + tableId, JSON.stringify(cart));
  renderCartBar();
}

function renderCartBar() {
  const count = Object.values(cart).reduce((s, c) => s + c.qty, 0);
  const bar = document.getElementById('cartBar');
  if (count > 0) {
    bar.style.display = 'flex';
    document.getElementById('cartSummary').textContent = count + ' item' + (count > 1 ? 's' : '') + ' added';
  } else {
    bar.style.display = 'none';
  }
}

function loadSettings() {
  db.collection('settings').doc('restaurant').get().then(doc => {
    if (doc.exists) {
      document.getElementById('restaurantName').textContent = doc.data().name || 'Restaurant';
      document.title = (doc.data().name || 'Restaurant') + ' | Menu';
    }
  });
}

function loadCategories() {
  db.collection('categories').orderBy('order').get().then(snap => {
    categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTabs();
  });
}

function renderTabs() {
  const wrap = document.getElementById('categoryTabs');
  wrap.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.textContent = 'All';
  allBtn.className = activeCategory === 'all' ? 'active' : '';
  allBtn.onclick = () => { activeCategory = 'all'; renderTabs(); renderMenu(); };
  wrap.appendChild(allBtn);
  categories.forEach(cat => {
    const b = document.createElement('button');
    b.textContent = cat.name;
    b.className = activeCategory === cat.id ? 'active' : '';
    b.onclick = () => { activeCategory = cat.id; renderTabs(); renderMenu(); };
    wrap.appendChild(b);
  });
}

function loadMenu() {
  db.collection('menu').where('available', '==', true).onSnapshot(snap => {
    menuItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMenu();
  }, err => {
    document.getElementById('menuList').innerHTML = '<div class="empty-state">Could not load menu. Check your connection.</div>';
  });
}

function renderMenu() {
  const list = activeCategory === 'all' ? menuItems : menuItems.filter(i => i.category === activeCategory);
  const wrap = document.getElementById('menuList');
  if (list.length === 0) {
    wrap.innerHTML = '<div class="empty-state">No items in this category yet.</div>';
    return;
  }
  wrap.innerHTML = list.map(item => {
    const qty = cart[item.id] ? cart[item.id].qty : 0;
    return `
    <div class="card item-card">
      <img class="item-img" src="${item.image || ''}" onerror="this.style.opacity=0">
      <div class="item-info">
        <p class="item-name">${item.name}</p>
        <p class="small">${item.description || ''}</p>
        <p class="item-price">₹${item.price}</p>
      </div>
      <div class="qty-ctrl">
        ${qty > 0 ? `<button onclick="changeQty('${item.id}',-1)">−</button><span>${qty}</span>` : ''}
        <button onclick="changeQty('${item.id}',1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function changeQty(itemId, delta) {
  const item = menuItems.find(i => i.id === itemId);
  if (!cart[itemId]) cart[itemId] = { name: item.name, price: item.price, qty: 0 };
  cart[itemId].qty += delta;
  if (cart[itemId].qty <= 0) delete cart[itemId];
  saveCart();
  renderMenu();
}

function openCart() {
  const wrap = document.getElementById('cartItems');
  const entries = Object.entries(cart);
  if (entries.length === 0) { toast('Your cart is empty'); return; }
  wrap.innerHTML = entries.map(([id, c]) => `
    <div class="cart-row">
      <span>${c.name} × ${c.qty}</span>
      <span>₹${c.price * c.qty}</span>
    </div>`).join('');
  const total = entries.reduce((s, [, c]) => s + c.price * c.qty, 0);
  document.getElementById('cartTotal').textContent = '₹' + total;
  document.getElementById('cartSheet').style.display = 'block';
}
function closeCart() { document.getElementById('cartSheet').style.display = 'none'; }

function placeOrder() {
  const entries = Object.entries(cart);
  if (entries.length === 0) return;
  const items = entries.map(([id, c]) => ({ itemId: id, name: c.name, price: c.price, qty: c.qty }));
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const notes = document.getElementById('specialInstructions').value.trim();

  db.collection('orders').add({
    table: tableId,
    items,
    notes,
    total,
    status: 'new',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(ref => {
    db.collection('tables').doc(tableId).set({
      status: 'occupied',
      lastOrderId: ref.id,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    let history = JSON.parse(localStorage.getItem('orderHistory_' + tableId) || '[]');
    history.push(ref.id);
    localStorage.setItem('orderHistory_' + tableId, JSON.stringify(history));

    cart = {};
    saveCart();
    document.getElementById('specialInstructions').value = '';
    closeCart();
    toast('✅ Order placed! Track it in "My Orders"');
  }).catch(err => toast('Failed to place order: ' + err.message));
}

function showOrderHistory() {
  const ids = JSON.parse(localStorage.getItem('orderHistory_' + tableId) || '[]');
  const wrap = document.getElementById('historyList');
  if (ids.length === 0) {
    wrap.innerHTML = '<div class="empty-state">No orders yet from this device.</div>';
  } else {
    wrap.innerHTML = '<div class="spinner"></div>';
    Promise.all(ids.map(id => db.collection('orders').doc(id).get())).then(docs => {
      wrap.innerHTML = docs.filter(d => d.exists).reverse().map(d => {
        const o = d.data();
        return `<div class="card">
          <div class="row"><strong>${o.items.map(i=>i.name+' ×'+i.qty).join(', ')}</strong></div>
          <div class="row"><span class="small">₹${o.total}</span><span class="badge ${o.status}">${o.status}</span></div>
        </div>`;
      }).join('') || '<div class="empty-state">No orders found.</div>';
    });
  }
  document.getElementById('historySheet').style.display = 'block';
}
function closeHistory() { document.getElementById('historySheet').style.display = 'none'; }

function callWaiter() {
  db.collection('tables').doc(tableId).set({
    waiterCall: true,
    waiterCallAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true }).then(() => toast('🔔 Waiter has been notified'));
}

function requestBill() {
  db.collection('tables').doc(tableId).set({
    billRequested: true,
    billRequestedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true }).then(() => toast('🧾 Bill requested — cashier notified'));
}

loadSettings();
loadCategories();
loadMenu();
renderCartBar();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
