<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waiter Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="container" style="padding-top:60px">
  <h1 style="text-align:center;color:var(--gold-soft)">🧑‍🍳 Waiter Login</h1>
  <div class="pin-dots"><span></span><span></span><span></span><span></span></div>
  <p id="loginError" style="text-align:center;color:var(--red);min-height:18px;font-size:13px"></p>
  <div class="pin-pad">
    <button onclick="pinPress('1')">1</button><button onclick="pinPress('2')">2</button><button onclick="pinPress('3')">3</button>
    <button onclick="pinPress('4')">4</button><button onclick="pinPress('5')">5</button><button onclick="pinPress('6')">6</button>
    <button onclick="pinPress('7')">7</button><button onclick="pinPress('8')">8</button><button onclick="pinPress('9')">9</button>
    <button></button><button onclick="pinPress('0')">0</button><button onclick="pinBackspace()">⌫</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="topbar">
    <div><h1 id="waiterName">Waiter</h1><div class="sub">Live orders</div></div>
    <button class="secondary" style="width:auto" onclick="logout()">Logout</button>
  </div>
  <div class="container" id="ordersList"><div class="spinner"></div></div>

  <div class="bottom-nav">
    <a href="#" class="active" onclick="setTab('orders')"><span class="icon">🔔</span>Orders</a>
    <a href="#" onclick="setTab('tables')"><span class="icon">🍽️</span>Tables</a>
    <a href="#" onclick="setTab('calls')"><span class="icon">📣</span>Calls</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>const REQUIRED_ROLE = 'waiter';</script>
<script src="auth.js"></script>
<script>
let activeTab = 'orders';

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
  event.target.closest('a').classList.add('active');
  render();
}

function onLoginSuccess() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('waiterName').textContent = currentUser.name || 'Waiter';
  render();
}

function render() {
  if (activeTab === 'orders') renderOrders();
  else if (activeTab === 'tables') renderTables();
  else if (activeTab === 'calls') renderCalls();
}

function renderOrders() {
  db.collection('orders').where('status', 'in', ['new', 'ready']).onSnapshot(snap => {
    if (activeTab !== 'orders') return;
    const orders = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
    const wrap = document.getElementById('ordersList');
    if (orders.length === 0) {
      wrap.innerHTML = '<div class="empty-state">No new or ready orders right now 🎉</div>';
      return;
    }
    wrap.innerHTML = orders.map(o => `
      <div class="card">
        <div class="row">
          <strong>Table ${o.table.replace(/^T0*/,'')}</strong>
          <span class="badge ${o.status}">${o.status === 'new' ? 'New Order' : 'Ready to Serve'}</span>
        </div>
        <p>${o.items.map(i => i.qty + ' × ' + i.name).join(', ')}</p>
        ${o.notes ? `<p class="small">📝 ${o.notes}</p>` : ''}
        <div class="row"><span class="small">₹${o.total}</span></div>
        ${o.status === 'new'
          ? `<button onclick="acceptOrder('${o.id}')">Accept Order</button>`
          : `<button onclick="markServed('${o.id}')">Mark Served</button>`}
      </div>`).join('');
  });
}

function acceptOrder(id) {
  db.collection('orders').doc(id).update({ status: 'preparing', acceptedBy: currentUser.name });
}
function markServed(id) {
  db.collection('orders').doc(id).update({ status: 'served', servedAt: firebase.firestore.FieldValue.serverTimestamp() });
}

function renderTables() {
  db.collection('tables').orderBy(firebase.firestore.FieldPath.documentId()).onSnapshot(snap => {
    if (activeTab !== 'tables') return;
    const wrap = document.getElementById('ordersList');
    if (snap.empty) { wrap.innerHTML = '<div class="empty-state">No tables set up yet. Ask admin to generate QR codes.</div>'; return; }
    wrap.innerHTML = snap.docs.map(d => {
      const t = d.data();
      return `<div class="card row">
        <span><strong>Table ${d.id.replace(/^T0*/,'')}</strong></span>
        <span class="badge ${t.status || 'available'}">${t.status || 'available'}</span>
      </div>`;
    }).join('');
  });
}

function renderCalls() {
  db.collection('tables').where('waiterCall', '==', true).onSnapshot(snap => {
    if (activeTab !== 'calls') return;
    const wrap = document.getElementById('ordersList');
    if (snap.empty) { wrap.innerHTML = '<div class="empty-state">No active calls 🙌</div>'; return; }
    wrap.innerHTML = snap.docs.map(d => `
      <div class="card row">
        <span>🔔 <strong>Table ${d.id.replace(/^T0*/,'')}</strong> needs assistance</span>
        <button style="width:auto" onclick="clearCall('${d.id}')">Resolved</button>
      </div>`).join('');
  });
}
function clearCall(tableId) {
  db.collection('tables').doc(tableId).update({ waiterCall: false });
}

if (!tryRestoreSession()) {
  document.getElementById('loginScreen').style.display = 'block';
}
</script>
</body>
</html>
